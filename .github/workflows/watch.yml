name: poke-watcher

on:
  schedule:
    # every 5 min — GitHub's scheduled-cron floor (and often still delayed under load)
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

concurrency:
  group: poke-watcher
  cancel-in-progress: false

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install requests pyyaml tzdata

      # carry last-seen stock state across runs (subscriptions live in Supabase)
      - name: Restore state
        uses: actions/cache/restore@v4
        with:
          path: state.json
          key: pokewatcher-state-${{ github.run_id }}
          restore-keys: pokewatcher-state-

      - name: Poll
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python watch.py

      - name: Save state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: state.json
          key: pokewatcher-state-${{ github.run_id }}
