name: poke-watcher

on:
  schedule:
    # restart the loop every 30 min; the job itself polls every ~30s while it runs
    - cron: "*/30 * * * *"
  workflow_dispatch: {}

concurrency:
  group: poke-watcher       # only one loop at a time; a new trigger queues, never overlaps
  cancel-in-progress: false

jobs:
  watch:
    runs-on: ubuntu-latest
    timeout-minutes: 32      # > the loop's 28 min, so the "Save state" step still runs
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install requests pyyaml tzdata

      # last-seen stock state carries across loop restarts (subscriptions live in Supabase)
      - name: Restore state
        uses: actions/cache/restore@v4
        with:
          path: |
            state.json
            health.json
          key: pokewatcher-state-${{ github.run_id }}
          restore-keys: pokewatcher-state-

      - name: Poll loop (~28 min, every 30s)
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          end=$((SECONDS + 28*60))
          while [ $SECONDS -lt $end ]; do
            python watch.py || true
            sleep 30
          done

      - name: Save state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            state.json
            health.json
          key: pokewatcher-state-${{ github.run_id }}
