# Copy to config.yaml and fill in during onboarding (step 0). config.yaml is gitignored.

# Discord incoming webhook — the URL IS the secret, keep it out of git.
# Create: channel → Edit Channel → Integrations → Webhooks → New Webhook → Copy URL
discord_webhook: https://discord.com/api/webhooks/CHANGE/ME

poll_interval_minutes: 12          # enforced by launchd, not a loop

retailers:                         # enable/disable sources
  salling: true                    # Bilka + BR + Føtex (shared Algolia backend)
  bogide: true                     # Bog & Idé (Shopify)
  coolshop: false                  # JSON API exists, not implemented yet
  proshop: false                   # bot-blocked (403), stub only

# "Is it sealed card product?" guard (secondary to sets). Whole-word, case-insensitive.
type_keywords:
  - booster
  - booster box
  - booster bundle
  - elite trainer box
  - ETB
  - display
  - tin
  - blister
  - premium collection
  - collection box
  - tcg

# PRIMARY filter: only ping for products from these sets. Empty = any sealed card product.
sets:
  - prismatic
  - "151"
  - ascended heroes
